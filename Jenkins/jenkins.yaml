jenkins:
  systemMessage: "Aniket DevOps Jenkins (Fully Automated)"

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          password: admin123

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:

          - usernamePassword:
              id: dockerhub-creds
              username: ${DOCKER_USERNAME}
              password: ${DOCKER_PASSWORD}
              description: DockerHub Credentials

          - usernamePassword:
              id: aws-creds
              username: ${AWS_ACCESS_KEY_ID}
              password: ${AWS_SECRET_ACCESS_KEY}
              description: AWS Credentials

unclassified:
  location:
    url: "http://localhost:8080/"

tool:
  git:
    installations:
      - name: git
        home: /usr/bin/git
